<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#059669" />
    <meta name="description" content="SIM KBM Ustaz V2.0 - Sistem Informasi Manajemen Kegiatan Belajar Mengajar Madrasah" />
    <title>SIM KBM Ustaz</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SIM KBM" />

    <!-- Disable cache for this HTML file -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Open Graph -->
    <meta property="og:title" content="SIM KBM Ustaz" />
    <meta property="og:description" content="Sistem Informasi Manajemen Kegiatan Belajar Mengajar Madrasah" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Unregister old service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(registration => registration.unregister());
        }).catch(err => console.log('[SW] Error unregistering:', err));

        // Register new service worker
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(err => {
            console.log('[SW] Registration failed:', err);
          });
        });
      }

      // Clear sessionStorage on page load for clean state
      if (!sessionStorage.getItem('_init_complete')) {
        // First time loading
        sessionStorage.clear();
        sessionStorage.setItem('_init_complete', 'true');
      }
    </script>
  </body>
</html>
